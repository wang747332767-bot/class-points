<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级积分管理系统</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #4A90D9;
            --success: #27AE60;
            --danger: #E74C3C;
            --bg: #F4F7FC;
            --card: #FFFFFF;
            --text: #2C3E50;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .navbar {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .mode-selector {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 4px;
        }
        .mode-btn {
            padding: 10px 20px;
            border-radius: 26px;
            border: none;
            background: transparent;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }
        .mode-btn.active {
            background: white;
            color: #2C3E50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .student-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .student-selector select {
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            background: white;
            color: #2C3E50;
            cursor: pointer;
            outline: none;
            min-width: 140px;
        }
        .current-points {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 30px;
        }
        .points-value { font-size: 32px; color: #FFD700; }
        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.9;
            margin-left: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        .nav-link:hover { opacity: 1; text-decoration: underline; }
        .main-content { padding: 24px; min-height: 400px; }
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .task-btn {
            background: var(--card);
            border: 2px solid #E0E6ED;
            border-radius: var(--radius);
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-size: 18px;
            font-weight: 600;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .task-btn.positive { border-color: #A9DFBF; background: #EAFAF1; }
        .task-btn.positive:hover { border-color: #27AE60; background: #D5F5E3; }
        .task-btn.negative { border-color: #F5B7B1; background: #FDEDEC; }
        .task-btn.negative:hover { border-color: #E74C3C; background: #FADBD8; }
        .task-icon { font-size: 32px; }
        .task-points { padding: 4px 12px; border-radius: 20px; font-weight: 700; }
        .task-points.positive { background: #D5F5E3; color: #1E8449; }
        .task-points.negative { background: #FADBD8; color: #B03A2E; }
        .notification-bar {
            background: #F0F4FA;
            border-radius: 30px;
            padding: 12px 20px;
            margin-top: 20px;
            overflow: hidden;
            white-space: nowrap;
            font-weight: 500;
        }
        .leader-panel { display: none; }
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            margin: 20px 0;
        }
        .member-card {
            background: white;
            border: 2px solid #E0E6ED;
            border-radius: var(--radius);
            padding: 14px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        .member-card.selected { border-color: var(--primary); background: #EBF5FF; }
        .member-card .name { font-weight: 700; font-size: 18px; }
        .member-card .points { font-size: 20px; font-weight: 700; color: var(--primary); }
        .micro-btns { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        .micro-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid #E0E6ED;
            background: white; font-weight: 700; cursor: pointer; font-size: 18px;
        }
        .micro-btn.minus:hover { background: #FADBD8; border-color: #E74C3C; }
        .micro-btn.plus:hover { background: #D5F5E3; border-color: #27AE60; }
        .batch-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .batch-btn {
            padding: 12px 20px; border-radius: 30px; border: none; font-weight: 600;
            cursor: pointer; color: white;
        }
        .batch-btn.positive { background: #27AE60; }
        .batch-btn.negative { background: #E74C3C; }
        .operation-log {
            background: #F8F9FA; border-radius: 12px; padding: 12px;
            max-height: 150px; overflow-y: auto; font-size: 14px;
        }
        .ranking-page { display: none; }
        .ranking-list { background: white; border-radius: var(--radius); overflow: hidden; }
        .ranking-item {
            display: flex; align-items: center; padding: 16px 20px;
            border-bottom: 1px solid #F0F0F0; gap: 16px;
        }
        .ranking-item .rank { font-weight: 700; font-size: 20px; width: 36px; }
        .ranking-item .name { flex: 1; font-weight: 600; }
        .ranking-item .progress-bar {
            flex: 2; height: 10px; background: #ECF0F1; border-radius: 10px;
            overflow: hidden; margin: 0 16px;
        }
        .ranking-item .progress-fill {
            height: 100%; background: linear-gradient(90deg, #F39C12, #F1C40F);
            border-radius: 10px; transition: width 0.5s;
        }
        .ranking-item .points { font-weight: 700; font-size: 18px; min-width: 60px; text-align: right; }
        .teacher-page { display: none; }
        .teacher-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #E0E6ED; }
        .teacher-tab {
            padding: 8px 20px; border-radius: 20px 20px 0 0; border: none;
            background: transparent; font-weight: 600; cursor: pointer; color: #7F8C8D;
        }
        .teacher-tab.active { background: var(--primary); color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #E0E6ED; }
        th { background: #F4F7FC; }
        .btn-sm {
            padding: 6px 14px; border-radius: 20px; border: none; font-weight: 600;
            cursor: pointer; font-size: 14px; margin: 2px;
        }
        .btn-edit { background: #EBF5FF; color: #2980B9; }
        .btn-delete { background: #FDEDEC; color: #C0392B; }
        .btn-add { background: #D5F5E3; color: #27AE60; }
        .export-btn {
            background: #27AE60; color: white; border: none; padding: 12px 24px;
            border-radius: 30px; font-weight: 600; cursor: pointer;
        }
        .back-btn {
            background: none; border: 2px solid white; color: white;
            padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 16px;">
            <div class="mode-selector" id="modeSelector">
                <button class="mode-btn active" data-mode="student">👤 学生</button>
                <button class="mode-btn" data-mode="leader">👥 组长</button>
            </div>
            <div class="student-selector">
                <select id="studentSelect"></select>
                <div class="current-points">✨ <span class="points-value" id="currentPointsDisplay">0</span></div>
            </div>
        </div>
        <div>
            <span class="nav-link" id="toRankingBtn">🏆 排行榜</span>
            <span class="nav-link" id="toTeacherBtn">🔑 老师管理</span>
        </div>
    </div>

    <!-- 学生页面 -->
    <div class="main-content" id="studentPage">
        <h2>选择一项为你的积分变动</h2>
        <div class="tasks-grid" id="studentTasks"></div>
        <div class="notification-bar">📢 <span id="notificationStream">等待动态...</span></div>
    </div>

    <!-- 组长页面 -->
    <div class="main-content leader-panel" id="leaderPage">
        <div style="display: flex; justify-content: space-between;">
            <h2>👥 组长快速管理</h2>
            <span id="leaderGroupInfo"></span>
        </div>
        <div class="member-grid" id="memberGrid"></div>
        <div class="batch-actions" id="leaderBatchActions"></div>
        <div class="operation-log">
            <strong>📋 操作记录</strong>
            <div id="logEntries">暂无记录</div>
        </div>
        <div class="notification-bar">📢 <span id="leaderNotificationStream">等待动态...</span></div>
    </div>

    <!-- 排行榜页面 -->
    <div class="main-content ranking-page" id="rankingPage">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🏆 班级积分排行榜</h2>
            <button class="back-btn" id="backToMainBtn">← 返回主页</button>
        </div>
        <div class="group-filter" id="groupFilter"></div>
        <div class="ranking-list" id="rankingList"></div>
        <div class="group-avg-cards" id="groupAvgCards" style="display: flex; gap: 14px; margin-top: 20px;"></div>
    </div>

    <!-- 教师管理页面 -->
    <div class="main-content teacher-page" id="teacherPage">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🔑 教师管理后台</h2>
            <button class="back-btn" id="backFromTeacherBtn">← 返回主页</button>
        </div>
        <div class="teacher-tabs">
            <button class="teacher-tab active" data-tab="students">👨‍🎓 学生管理</button>
            <button class="teacher-tab" data-tab="tasks">📋 任务配置</button>
            <button class="teacher-tab" data-tab="data">📊 数据导出</button>
        </div>
        <div class="teacher-panel" id="teacherPanelContainer"></div>
    </div>
</div>

<script>
(function() {
    // API 同源，无需指定域名
    const API_BASE = '';
    const socket = io();

    let STUDENTS = [];
    let TASKS = [];
    let currentMode = 'student';
    let currentStudentId = null;
    let leaderGroup = '';
    let selectedMembers = new Set();
    let notifications = [];
    let currentTeacherTab = 'students';

    // DOM 元素
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const modeSelector = $('#modeSelector');
    const studentSelect = $('#studentSelect');
    const currentPointsDisplay = $('#currentPointsDisplay');
    const studentPage = $('#studentPage');
    const leaderPage = $('#leaderPage');
    const rankingPage = $('#rankingPage');
    const teacherPage = $('#teacherPage');
    const studentTasksContainer = $('#studentTasks');
    const notificationStream = $('#notificationStream');
    const leaderNotificationStream = $('#leaderNotificationStream');
    const memberGrid = $('#memberGrid');
    const leaderBatchActions = $('#leaderBatchActions');
    const logEntries = $('#logEntries');
    const rankingList = $('#rankingList');
    const groupFilter = $('#groupFilter');
    const groupAvgCards = $('#groupAvgCards');
    const leaderGroupInfo = $('#leaderGroupInfo');
    const teacherPanelContainer = $('#teacherPanelContainer');

    // ---------- 工具函数 ----------
    function getStudentById(id) {
        return STUDENTS.find(s => s._id === id || s.id === id);
    }

    function addNotification(text) {
        notifications.unshift(text);
        if (notifications.length > 10) notifications.pop();
        const stream = notifications.join('    ');
        if (notificationStream) notificationStream.textContent = stream;
        if (leaderNotificationStream) leaderNotificationStream.textContent = stream;
    }

    // 广播处理（由服务器推送或本地调用）
    function handlePointUpdate(data) {
        const student = getStudentById(data.userId);
        if (student) student.points = data.newPoints;
        addNotification(`${data.name} ${data.reason} ${data.change>0?'+'+data.change:data.change}`);
        if (currentMode === 'student' && currentStudentId === data.userId) {
            currentPointsDisplay.textContent = data.newPoints;
        }
        if (currentMode === 'leader') renderLeaderPanel();
        if (rankingPage.style.display !== 'none') renderRanking();
        if (teacherPage.style.display !== 'none' && currentTeacherTab === 'students') renderTeacherStudentsPanel();
    }

    // ---------- API 调用 ----------
    async function fetchStudents() {
        const res = await fetch(API_BASE + '/api/students');
        STUDENTS = await res.json();
    }

    async function fetchTasks() {
        const res = await fetch(API_BASE + '/api/tasks');
        TASKS = await res.json();
    }

    async function applyPointsChange(userId, change, reason) {
        const res = await fetch(`${API_BASE}/api/students/${userId}/changePoints`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ change, reason })
        });
        if (!res.ok) {
            const err = await res.json();
            alert(err.message);
            return false;
        }
        const updated = await res.json();
        const student = getStudentById(userId);
        if (student) student.points = updated.points;
        return true;
    }

    // ---------- 页面渲染 ----------
    function populateStudentSelect() {
        studentSelect.innerHTML = STUDENTS.map(s => 
            `<option value="${s._id}" ${s._id === currentStudentId ? 'selected' : ''}>${s.name} (${s.group})</option>`
        ).join('');
    }

    function renderStudentTasks() {
        studentTasksContainer.innerHTML = TASKS.map(t => {
            const positive = t.points >= 0;
            const cls = positive ? 'positive' : 'negative';
            const sign = positive ? '+' : '';
            return `<div class="task-btn ${cls}" data-points="${t.points}" data-reason="${t.name}">
                <span class="task-icon">${t.icon}</span>
                <span>${t.name}</span>
                <span class="task-points ${cls}">${sign}${t.points}</span>
            </div>`;
        }).join('') + `
            <div style="grid-column: span 2; display: flex; gap: 8px;">
                <input type="number" id="customPoints" placeholder="自定义分值（可负）" style="flex:1; padding:10px; border-radius:20px; border:2px solid #E0E6ED;">
                <button id="customReasonBtn" style="padding:10px 20px; border-radius:20px; background:var(--primary); color:white; border:none; font-weight:600; cursor:pointer;">📌 自定义</button>
            </div>`;
        $$('.task-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const points = parseInt(btn.dataset.points);
                const reason = btn.dataset.reason;
                if (!currentStudentId) return alert('请先选择学生');
                await applyPointsChange(currentStudentId, points, reason);
            });
        });
        $('#customReasonBtn')?.addEventListener('click', async () => {
            const input = $('#customPoints');
            const points = parseInt(input.value);
            if (isNaN(points) || points === 0) return alert('请输入非零整数');
            const reason = prompt('原因：', points>0?'自定义加分':'自定义扣分');
            if (reason && currentStudentId) {
                await applyPointsChange(currentStudentId, points, reason);
                input.value = '';
            }
        });
    }

    function renderLeaderPanel() {
        if (!leaderGroup) return;
        const members = STUDENTS.filter(s => s.group === leaderGroup);
        leaderGroupInfo.textContent = `组长管理：${leaderGroup}`;
        memberGrid.innerHTML = members.map(m => `
            <div class="member-card ${selectedMembers.has(m._id)?'selected':''}" data-id="${m._id}">
                <div class="name">${m.name}</div>
                <div class="points">✨ ${m.points}</div>
                <div class="micro-btns">
                    <div class="micro-btn minus">-</div>
                    <div class="micro-btn plus">+</div>
                </div>
            </div>`).join('');
        // 事件绑定省略（同上逻辑，通过事件委托处理）
        // 为简化，我们使用事件委托在memberGrid上
        memberGrid.onclick = async (e) => {
            const card = e.target.closest('.member-card');
            if (!card) return;
            const id = card.dataset.id;
            if (e.target.classList.contains('micro-btn')) {
                const delta = e.target.classList.contains('minus') ? -1 : 1;
                await applyPointsChange(id, delta, '组长微调');
                addOperationLog(getStudentById(id).name, delta, '微调');
                return;
            }
            selectedMembers.has(id) ? selectedMembers.delete(id) : selectedMembers.add(id);
            renderLeaderPanel();
        };

        const batchHtml = TASKS.map(t => {
            const cls = t.points >= 0 ? 'positive' : 'negative';
            const sign = t.points >= 0 ? '+' : '';
            return `<button class="batch-btn ${cls}" data-points="${t.points}" data-reason="${t.name}">${t.icon} ${t.name} ${sign}${t.points}</button>`;
        }).join('');
        leaderBatchActions.innerHTML = `<strong>已选${selectedMembers.size}人：</strong>${batchHtml}
            <button class="batch-btn" id="customBatchBtn" style="background:#8E44AD;">📌 自定义批量</button>
            <button class="batch-btn" id="clearSelectionBtn" style="background:#E67E22;">取消选中</button>`;
        $$('.batch-btn[data-points]').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (selectedMembers.size === 0) return alert('请选择组员');
                const points = parseInt(btn.dataset.points);
                const reason = btn.dataset.reason;
                for (const id of selectedMembers) {
                    await applyPointsChange(id, points, reason);
                    addOperationLog(getStudentById(id).name, points, reason);
                }
            });
        });
        $('#customBatchBtn')?.addEventListener('click', async () => {
            if (selectedMembers.size === 0) return alert('请选择组员');
            const points = parseInt(prompt('自定义分值（可负）：', '5'));
            if (isNaN(points) || points === 0) return;
            const reason = prompt('原因：', points>0?'自定义加分':'自定义扣分');
            if (reason) {
                for (const id of selectedMembers) {
                    await applyPointsChange(id, points, reason);
                    addOperationLog(getStudentById(id).name, points, reason);
                }
            }
        });
        $('#clearSelectionBtn')?.addEventListener('click', () => {
            selectedMembers.clear();
            renderLeaderPanel();
        });
    }

    let operationLogs = [];
    function addOperationLog(name, change, reason) {
        operationLogs.unshift(`${name} ${change>0?'+'+change:change} (${reason})`);
        if (operationLogs.length > 20) operationLogs.pop();
        logEntries.innerHTML = operationLogs.map(l => `<div>${l}</div>`).join('');
    }

    function renderRanking(filterGroup = '全部') {
        let filtered = filterGroup === '全部' ? STUDENTS : STUDENTS.filter(s => s.group === filterGroup);
        const sorted = [...filtered].sort((a,b) => b.points - a.points);
        const maxPoints = sorted.length ? Math.max(...sorted.map(s=>s.points), 1) : 1;
        rankingList.innerHTML = sorted.map((s, i) => {
            let medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
            return `<div class="ranking-item">
                <span class="rank">${medal || i+1}</span>
                <span class="name">${s.name} <small>${s.group}</small></span>
                <div class="progress-bar"><div class="progress-fill" style="width:${(s.points/maxPoints)*100}%"></div></div>
                <span class="points">✨ ${s.points}</span>
            </div>`;
        }).join('');
        const groups = [...new Set(STUDENTS.map(s=>s.group))];
        groupFilter.innerHTML = `<button class="filter-btn ${filterGroup==='全部'?'active':''}" data-group="全部">全部</button>` +
            groups.map(g => `<button class="filter-btn ${filterGroup===g?'active':''}" data-group="${g}">${g}</button>`).join('');
        $$('.filter-btn').forEach(b => b.onclick = () => renderRanking(b.dataset.group));
        const avgs = groups.map(g => {
            const mems = STUDENTS.filter(s=>s.group===g);
            const avg = mems.length ? Math.round(mems.reduce((a,b)=>a+b.points,0)/mems.length) : 0;
            return `<div class="group-avg-card" style="background:white; padding:12px 20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">${g} 均分：${avg}</div>`;
        });
        groupAvgCards.innerHTML = avgs.join('');
    }

    // 教师管理渲染函数（因篇幅省略完整细节，这里给出核心结构，调用API增删改）
    async function renderTeacherStudentsPanel() {
        const students = STUDENTS;
        let html = `<button class="btn-sm btn-add" id="addStudentBtn">+ 添加学生</button>
        <table><tr><th>姓名</th><th>小组</th><th>积分</th><th>组长</th><th>操作</th></tr>
        ${students.map(s => `<tr>
            <td>${s.name}</td><td>${s.group}</td><td>${s.points}</td><td>${s.isLeader?'👑是':'否'}</td>
            <td>
                <button class="btn-sm btn-edit" data-id="${s._id}">编辑</button>
                <button class="btn-sm btn-delete" data-id="${s._id}">删除</button>
                ${!s.isLeader ? `<button class="btn-sm set-leader" data-id="${s._id}">设组长</button>` : `<button class="btn-sm unset-leader" data-id="${s._id}">取消组长</button>`}
            </td>
        </tr>`).join('')}
        </table>`;
        teacherPanelContainer.innerHTML = html;
        // 事件绑定...
        $('#addStudentBtn')?.addEventListener('click', () => showStudentForm());
        $$('.btn-edit').forEach(b => b.onclick = () => showStudentForm(b.dataset.id));
        $$('.btn-delete').forEach(b => b.onclick = async () => {
            if (confirm('删除？')) {
                await fetch(`${API_BASE}/api/students/${b.dataset.id}`, { method: 'DELETE' });
                await fetchStudents();
                renderTeacherStudentsPanel();
            }
        });
        $$('.set-leader').forEach(b => b.onclick = async () => {
            const student = getStudentById(b.dataset.id);
            await fetch(`${API_BASE}/api/students/${b.dataset.id}`, {
                method: 'PUT',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ isLeader: true })
            });
            await fetchStudents();
            renderTeacherStudentsPanel();
        });
        // 省略 unset-leader 同理
    }

    function showStudentForm(id) {
        // 弹出表单，提交时调用 POST 或 PUT /api/students
        // 由于篇幅，这里用 prompt 简易实现
        const name = prompt('姓名：');
        if (!name) return;
        const group = prompt('小组：');
        const points = parseInt(prompt('积分：', '0'));
        const isLeader = confirm('设为组长？');
        const data = { name, group, points, isLeader };
        if (id) {
            fetch(`${API_BASE}/api/students/${id}`, {
                method: 'PUT',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(data)
            }).then(() => { fetchStudents(); renderTeacherStudentsPanel(); });
        } else {
            fetch(`${API_BASE}/api/students`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(data)
            }).then(() => { fetchStudents(); renderTeacherStudentsPanel(); });
        }
    }

    async function renderTeacherTasksPanel() {
        const tasks = TASKS;
        let html = `<button class="btn-sm btn-add" id="addTaskBtn">+ 添加</button>
        <table><tr><th>图标</th><th>名称</th><th>分值</th><th>操作</th></tr>
        ${tasks.map((t,i) => `<tr><td>${t.icon}</td><td>${t.name}</td><td style="color:${t.points>=0?'green':'red'}">${t.points}</td>
            <td><button class="btn-sm btn-edit" data-index="${i}">编辑</button>
            <button class="btn-sm btn-delete" data-index="${i}">删除</button></td></tr>`).join('')}
        </table>`;
        teacherPanelContainer.innerHTML = html;
        $('#addTaskBtn')?.addEventListener('click', () => {
            const icon = prompt('图标emoji：', '⭐');
            const name = prompt('名称：');
            const points = parseInt(prompt('分值（可负）：', '1'));
            if (name && !isNaN(points)) {
                TASKS.push({ icon, name, points });
                saveTasks();
            }
        });
        $$('.btn-delete').forEach(b => b.onclick = () => {
            TASKS.splice(parseInt(b.dataset.index), 1);
            saveTasks();
        });
    }

    async function saveTasks() {
        await fetch(`${API_BASE}/api/tasks/batch`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(TASKS)
        });
        await fetchTasks();
        renderStudentTasks();
        if (currentMode === 'leader') renderLeaderPanel();
        renderTeacherTasksPanel();
    }

    function renderTeacherDataPanel() {
        teacherPanelContainer.innerHTML = `<button class="export-btn" id="exportCsvBtn">📥 导出CSV</button>`;
        $('#exportCsvBtn').onclick = () => {
            const csv = '姓名,小组,积分,组长\n' + STUDENTS.map(s => `${s.name},${s.group},${s.points},${s.isLeader?'是':'否'}`).join('\n');
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `积分_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        };
    }

    function renderTeacherPanel() {
        if (currentTeacherTab === 'students') renderTeacherStudentsPanel();
        else if (currentTeacherTab === 'tasks') renderTeacherTasksPanel();
        else if (currentTeacherTab === 'data') renderTeacherDataPanel();
    }

    // 页面切换
    function showPage(page) {
        studentPage.style.display = 'none';
        leaderPage.style.display = 'none';
        rankingPage.style.display = 'none';
        teacherPage.style.display = 'none';
        if (page === 'student') studentPage.style.display = 'block';
        else if (page === 'leader') {
            const student = getStudentById(currentStudentId);
            if (student && student.isLeader) {
                leaderGroup = student.group;
            } else {
                const firstLeader = STUDENTS.find(s => s.isLeader);
                if (firstLeader) {
                    currentStudentId = firstLeader._id;
                    leaderGroup = firstLeader.group;
                    studentSelect.value = currentStudentId;
                } else return alert('没有组长');
            }
            leaderPage.style.display = 'block';
            selectedMembers.clear();
            renderLeaderPanel();
        } else if (page === 'ranking') {
            rankingPage.style.display = 'block';
            renderRanking();
        } else if (page === 'teacher') {
            teacherPage.style.display = 'block';
            document.querySelectorAll('.teacher-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.teacher-tab[data-tab="students"]').classList.add('active');
            currentTeacherTab = 'students';
            renderTeacherPanel();
        }
        const student = getStudentById(currentStudentId);
        if (student && currentPointsDisplay) currentPointsDisplay.textContent = student.points;
    }

    // 事件监听
    modeSelector.addEventListener('click', e => {
        if (e.target.classList.contains('mode-btn')) {
            currentMode = e.target.dataset.mode;
            $$('.mode-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            showPage(currentMode);
        }
    });
    studentSelect.addEventListener('change', () => {
        currentStudentId = studentSelect.value;
        const student = getStudentById(currentStudentId);
        if (student) {
            currentPointsDisplay.textContent = student.points;
            if (currentMode === 'leader' && !student.isLeader) {
                alert('不是组长，切回学生');
                currentMode = 'student';
                document.querySelector('.mode-btn[data-mode="student"]').click();
            }
        }
    });
    $('#toRankingBtn').addEventListener('click', () => showPage('ranking'));
    $('#backToMainBtn').addEventListener('click', () => showPage(currentMode));
    $('#toTeacherBtn').addEventListener('click', () => showPage('teacher'));
    $('#backFromTeacherBtn').addEventListener('click', () => showPage(currentMode));
    document.querySelector('.teacher-tabs').addEventListener('click', e => {
        if (e.target.classList.contains('teacher-tab')) {
            currentTeacherTab = e.target.dataset.tab;
            $$('.teacher-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            renderTeacherPanel();
        }
    });

    // WebSocket
    socket.on('pointUpdate', handlePointUpdate);
    socket.on('dataChanged', async () => {
        await fetchStudents();
        await fetchTasks();
        populateStudentSelect();
        if (currentMode === 'leader') renderLeaderPanel();
        if (rankingPage.style.display !== 'none') renderRanking();
        if (teacherPage.style.display !== 'none') renderTeacherPanel();
    });

    // 初始化
    (async function init() {
        await fetchStudents();
        await fetchTasks();
        if (STUDENTS.length === 0) {
            alert('数据库中没有学生，请先进入教师管理添加学生！');
        }
        currentStudentId = STUDENTS.length ? STUDENTS[0]._id : null;
        if (currentStudentId) studentSelect.value = currentStudentId;
        populateStudentSelect();
        renderStudentTasks();
        showPage('student');
        addNotification('系统已启动，连接服务器成功！');
    })();
})();
</script>
</body>
</html>
